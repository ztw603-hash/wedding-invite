<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ангелина & Яков</title>
  <link rel="stylesheet" href="css/styles.css">
 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="hero">

  <div class="hero-inner">

    <!-- ЛЕВАЯ ЧАСТЬ -->
    <div class="hero-left">
      <div class="monogram">H</div>

      <div class="line"></div>

      <div class="names">
        АНГЕЛИНА<br>
        <span>&</span><br>
        ЯКОВ
      </div>

      <div class="line"></div>

      <div class="ornament">Ж</div>
    </div>

    <!-- ПРАВАЯ ЧАСТЬ -->
    <div class="hero-right">
      <img src="photo.jpg" alt="Фото пары">
    </div>

  </div>

  <!-- НИЖНИЙ БЛОК -->
  <div class="hero-bottom">
    <div class="date">07 августа 2026</div>
    <div class="welcome">ЖДЁМ ВАС</div>

    <div class="timer">
      <div><span id="weeks">00</span><small>НЕДЕЛЬ</small></div>
      <div><span id="days">00</span><small>ДНЕЙ</small></div>
      <div><span id="hours">00</span><small>ЧАСОВ</small></div>
      <div><span id="minutes">00</span><small>МИНУТ</small></div>
      <div><span id="seconds">00</span><small>СЕКУНД</small></div>
    </div>
  </div>

</div>

<script>
const targetDate = new Date("August 7, 2026 17:00:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const distance = targetDate - now;

  if (distance < 0) return;

  const total = Math.floor(distance / 1000);

  const weeks = Math.floor(total / (7 * 24 * 3600));
  const days = Math.floor((total % (7 * 24 * 3600)) / (24 * 3600));
  const hours = Math.floor((total % (24 * 3600)) / 3600);
  const minutes = Math.floor((total % 3600) / 60);
  const seconds = total % 60;

  document.getElementById("weeks").innerHTML = weeks;
  document.getElementById("days").innerHTML = days;
  document.getElementById("hours").innerHTML = hours;
  document.getElementById("minutes").innerHTML = minutes;
  document.getElementById("seconds").innerHTML = seconds;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
